pose_estimation:
  backend: mediapipe
  min_detection_confidence: 0.5
  min_tracking_confidence: 0.5
  model_complexity: 1  # 0, 1, or 2

exercises:
  squat:
    depth_threshold: 90
    back_angle_range: [70, 110]
  deadlift:
    back_alignment_threshold: 15
  
video_processing:
  target_fps: 30
  resolution: [640, 480]
